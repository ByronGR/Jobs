<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password — Nearwork</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #111111;
      --muted: #6B7280;
      --muted2: #9E9E9E;
      --border: #EBEBEB;
      --accent: #16A085;
      --accent-dark: #12866E;
      --accent-soft: #E8F8F5;
      --accent-glow: rgba(22,160,133,.16);
      --red: #E74C7C;
      --sans: 'Poppins', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: #F9FAFB;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 36px 32px 32px;
      box-shadow: 0 8px 40px rgba(15,23,42,.08);
    }
    .logo {
      font-size: 18px;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: -.03em;
      margin-bottom: 24px;
    }
    .logo span { color: var(--accent); }
    .heading { font-size: 22px; font-weight: 800; letter-spacing: -.025em; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .pw-wrap { position: relative; }
    .field input {
      width: 100%;
      padding: 12px 40px 12px 14px;
      border: 1px solid var(--border);
      border-radius: 11px;
      font-size: 14px;
      font-family: var(--sans);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      color: var(--ink);
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted2);
      display: flex;
      align-items: center;
    }
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--sans);
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-ghost {
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      padding: 10px;
    }
    .btn-ghost:hover { color: var(--ink); }
    .notice {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .notice-error { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .notice-success { background: var(--accent-soft); color: var(--accent-dark); border: 1px solid rgba(22,160,133,.25); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Near<span>work</span></div>
    <div id="content"></div>
  </div>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const email = params.get('email') || '';
    const content = document.getElementById('content');

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderInvalid() {
      content.innerHTML = `
        <div class="heading">Link expired</div>
        <div class="sub">This password reset link is invalid or has already been used.</div>
        <a href="/" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">Back to job board</a>
      `;
    }

    function renderSuccess() {
      content.innerHTML = `
        <div class="notice notice-success">✓ Password updated! You can now log in with your new password.</div>
        <a href="/" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">Back to job board</a>
      `;
    }

    function renderForm(errorMsg) {
      content.innerHTML = `
        <div class="heading">Set a new password.</div>
        <div class="sub">${email ? `Resetting for <strong>${esc(email)}</strong>. Choose a password you haven't used before.` : 'Choose a new password you haven\'t used before.'}</div>
        ${errorMsg ? `<div class="notice notice-error">${esc(errorMsg)}</div>` : ''}
        <div class="field">
          <label for="newPw">New password</label>
          <div class="pw-wrap">
            <input id="newPw" type="password" autocomplete="new-password" minlength="6" placeholder="••••••••" />
            <button type="button" class="pw-toggle" id="toggleNew" aria-label="Show password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="confirmPw">Confirm password</label>
          <div class="pw-wrap">
            <input id="confirmPw" type="password" autocomplete="new-password" minlength="6" placeholder="••••••••" />
            <button type="button" class="pw-toggle" id="toggleConfirm" aria-label="Show confirm">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn btn-primary" id="submitBtn">Set new password</button>
        <a href="/" class="btn btn-ghost" style="display:block;text-align:center;text-decoration:none;">Back to job board</a>
      `;

      function wireToggle(btnId, inputId) {
        document.getElementById(btnId).addEventListener('click', () => {
          const input = document.getElementById(inputId);
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
        });
      }
      wireToggle('toggleNew', 'newPw');
      wireToggle('toggleConfirm', 'confirmPw');

      document.getElementById('submitBtn').addEventListener('click', async () => {
        const newPw = document.getElementById('newPw').value;
        const confirmPw = document.getElementById('confirmPw').value;
        if (newPw.length < 6) { renderForm('Password must be at least 6 characters.'); return; }
        if (newPw !== confirmPw) { renderForm('Passwords do not match.'); return; }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Updating…';
        try {
          const response = await fetch('/api/confirm-reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword: newPw }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.ok) {
            throw new Error(data.error || 'This link has expired or has already been used.');
          }
          renderSuccess();
        } catch (error) {
          renderForm(error.message || 'This link has expired or already been used. Please request a new one.');
        }
      });
    }

    if (!token) {
      renderInvalid();
    } else {
      renderForm();
    }
  </script>
</body>
</html>
